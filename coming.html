<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malnad Coffee House</title>
 <link rel="icon" type="image/png" href="WhatsApp Image 2026-04-25 at 22.27.16.jpeg">

<!-- Updated Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#f0eded;
  color:#fff;
  overflow-x:hidden;
}

.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  background:linear-gradient(rgba(255, 244, 244, 0.6),rgba(0,0,0,.85)),
  url('ante-samarzija-lsmu0rUhUOk-unsplash.jpg') center/cover;
}

/* Heading with premium font */
h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(2rem, 5vw, 3.8rem);
  letter-spacing:2px;
}

/* Subtitle */
p{
  opacity:.85;
  margin:10px 0 20px;
  font-size:clamp(1rem, 2.5vw, 1.2rem);
}

/* SVG responsive */
#svgObj{
  width:100%;
  max-width:600px;
  margin:20px auto;
}

/* CTA */
.btn{
  padding:12px 28px;
  background:#c59d5f;
  border:none;
  border-radius:30px;
  color:#fff;
  cursor:pointer;
  transition:.3s;
  font-weight:500;
}
.btn:hover{
  transform:scale(1.08);
  background:#b88c4a;
}

/* countdown */
.countdown{
  display:flex;
  gap:12px;
  margin-top:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.box{
  background:rgba(255,255,255,.12);
  padding:10px 15px;
  border-radius:10px;
  min-width:70px;
  backdrop-filter:blur(6px);
}

.box span{
  font-size:clamp(1.3rem, 4vw, 2rem);
  font-weight:600;
}

/* footer */
footer{
  text-align:center;
  padding:15px;
  background:#000;
  font-size:.8rem;
  font-family:'Inter',sans-serif;
}

/* MOBILE */
@media(max-width:600px){
  .hero{
    padding:30px 15px;
  }

  .countdown{
    gap:8px;
  }

  .box{
    padding:8px 10px;
  }

  .btn{
    width:80%;
    max-width:250px;
  }
}
</style>
</head>

<body>

<section class="hero">
  <h1>Malnad Coffee House</h1>
  <p>“From Malnad Estates to Exceptional Cafés”</p>
  <h3>“Now Roasting — Launching Soon”</h3>

  <object id="svgObj" type="image/svg+xml" data="3rTrA01.svg"></object>

  <div class="countdown">
    <div class="box"><span id="d">00</span><br>Days</div>
    <div class="box"><span id="h">00</span><br>Hours</div>
    <div class="box"><span id="m">00</span><br>Min</div>
    <div class="box"><span id="s">00</span><br>Sec</div>
  </div>

</section>

<footer>
  © 2026 Malnad Coffee House
</footer>

<script>
// countdown
// Set launch date: Year, Month (0-11), Day, Hour, Minute, Second
const launch = new Date(2026, 4, 10, 17, 0, 0); // May 10, 5:00 PM

setInterval(()=>{
  const now = new Date().getTime();
  const diff = launch - now;

  if(diff <= 0){
    document.getElementById('d').innerText = "00";
    document.getElementById('h').innerText = "00";
    document.getElementById('m').innerText = "00";
    document.getElementById('s').innerText = "00";
    return;
  }

  document.getElementById('d').innerText = Math.floor(diff/(1000*60*60*24));
  document.getElementById('h').innerText = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  document.getElementById('m').innerText = Math.floor((diff%(1000*60*60))/(1000*60));
  document.getElementById('s').innerText = Math.floor((diff%(1000*60))/1000);

},1000);


// SVG animation
const obj=document.getElementById('svgObj');

obj.addEventListener('load',()=>{
  const svgDoc=obj.contentDocument;

  const circles=svgDoc.querySelectorAll('circle, ellipse');
  circles.forEach((el)=>{
    el.animate([
      {transform:'translateY(0px)'},
      {transform:'translateY(-4px)'},
      {transform:'translateY(0px)'}
    ],{
      duration:1000+Math.random()*1000,
      iterations:Infinity
    });
  });

  const paths=svgDoc.querySelectorAll('path');
  paths.forEach((p,i)=>{
    p.animate([
      {transform:'translateY(0px)'},
      {transform:'translateY(-2px)'},
      {transform:'translateY(0px)'}
    ],{
      duration:2000+i*200,
      iterations:Infinity
    });
  });
});
</script>

</body>
</html>
